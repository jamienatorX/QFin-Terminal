services:
  - type: web
    name: qfin-terminal-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: ADMIN_API_KEY
        sync: false
      - key: AI_PROVIDER_API_KEY
        sync: false
      - key: AI_PROVIDER_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: AI_PROVIDER_MODEL_DEEP
        value: glm-5.2
      - key: AI_PROVIDER_MODEL_FAST
        value: glm-5.2
      - key: AI_PROVIDER_MODEL_FLASH
        value: glm-5.1
      - key: AI_PROVIDER_MODEL_VISION
        value: glm-5.2
      - key: AI_PROVIDER_NEWS_MODEL
        value: glm-5.2
      - key: AI_PROVIDER_TIMEOUT_SECONDS
        value: "45"
      - key: AI_PROVIDER_TOTAL_TIMEOUT_SECONDS
        value: "75"
      - key: FINANCIAL_DATA_TIMEOUT_SECONDS
        value: "18"
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://q-fin-terminal.vercel.app
      - key: NEWSAPI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false

