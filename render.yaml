services:
  - type: web
    name: qfin-terminal-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: DASHSCOPE_MODEL
        value: qwen3.7-plus
      - key: DASHSCOPE_NEWS_MODEL
        value: qwen-plus
      - key: NEWSAPI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
