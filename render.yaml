services:
  - type: web
    name: qfin-terminal-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: DASHSCOPE_MODEL_DEEP
        value: qwen3.7-max
      - key: DASHSCOPE_MODEL_FAST
        value: qwen3.7-plus
      - key: DASHSCOPE_MODEL_FLASH
        value: qwen3.6-flash
      - key: DASHSCOPE_MODEL_VISION
        value: qwen3.7-plus
      - key: DASHSCOPE_NEWS_MODEL
        value: qwen3.7-plus
      - key: DASHSCOPE_TIMEOUT_SECONDS
        value: "45"
      - key: DASHSCOPE_TOTAL_TIMEOUT_SECONDS
        value: "75"
      - key: NEWSAPI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false

